{% extends "base.html" %}
{% block title %}Hospital Registration{% endblock %}

{% block content %}

<div class="dashboard-container">

    <div class="page-wrapper" style="max-width:900px;margin:auto;">

        <!-- HEADER -->
        <div class="details-header">
            <div>
                <h2>Hospital Registration</h2>
                <p style="color:#6b7280;margin-top:6px;">
                    Register your hospital to upload verified medical reports
                </p>
            </div>

            <span class="admin-badge">
                REGISTRATION
            </span>
        </div>

        <hr class="divider">

        <!-- FORM CARD -->
        <div class="upload-box">

            <form method="POST">

                <!-- ✅ TWO COLUMN GRID -->
                <div class="form-grid">

                    <!-- LEFT COLUMN -->
                    <div>
                        <div class="form-group">
                            <label>Hospital Name</label>
                            <input type="text" name="hospital_name"
                                   placeholder="Enter hospital name" required>
                        </div>

                        <div class="form-group">
                            <label>Hospital ID</label>
                            <input type="text" name="hospital_id"
                                   placeholder="Unique hospital ID" required>
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email"
                                   placeholder="Official email" required>
                        </div>

                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" name="password"
                                   placeholder="Create password" required>
                        </div>
                    </div>

                    <!-- RIGHT COLUMN -->
                    <div>
                        <div class="form-group">
                            <label>Hospital Type</label>
                            <select name="role" id="roleSelect"
                                    required class="styled-select">
                                <option value="" disabled selected hidden>
                                    Select Hospital Type
                                </option>
                                <option value="main">Main Hospital</option>
                                <option value="branch">Branch Hospital</option>
                            </select>
                        </div>

                        <div class="form-group branch-field" style="display:none;">
                            <label>Branch Name</label>
                            <input type="text" name="branch_name"
                                   placeholder="Branch hospital name">
                        </div>

                        <div class="form-group branch-field" style="display:none;">
                            <label>Main Hospital ID</label>
                            <input type="text" name="parent_hospital"
                                   placeholder="Main hospital ID">
                        </div>

                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" name="address"
                                   placeholder="Hospital address">
                        </div>
                    </div>

                </div>

                <!-- BUTTON -->
                <button type="submit" class="form-btn" style="width:100%;margin-top:25px;">
                    Register Hospital
                </button>

            </form>

        </div>

        <p style="text-align:center;margin-top:25px;color:#6b7280;">
            Already registered?
            <a href="/login" style="color:#2563eb;font-weight:600;">
                Login here
            </a>
        </p>

    </div>
</div>

<!-- JS -->
<script>
const roleSelect = document.getElementById("roleSelect");
const branchFields = document.querySelectorAll(".branch-field");

roleSelect.addEventListener("change", function () {
    branchFields.forEach(f => {
        f.style.display = this.value === "branch" ? "block" : "none";
    });
});
</script>

{% if error %}
<script>
Swal.fire({
    icon: 'error',
    title: 'Registration Failed',
    text: '{{ error }}'
});
</script>
{% endif %}

{% endblock %}
